<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Mi Primera Pagina Simple con HTML</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            color: #333;
        }

        header {
            background: rgba(0,0,0,0.7);
            color: white;
            padding: 20px;
            text-align: center;
        }

        main {
            padding: 40px;
            text-align: center;
        }

        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            max-width: 400px;
            margin: auto;
            box-shadow: 0 10px 20px rgba(0,0,0,0.2);
        }

        button {
            margin-top: 20px;
            padding: 10px 20px;
            border: none;
            background: #4facfe;
            color: white;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        button:hover {
            background: #007bff;
        }

        footer {
            text-align: center;
            padding: 15px;
            background: rgba(0,0,0,0.7);
            color: white;
            position: fixed;
            width: 100%;
            bottom: 0;
        }
    </style>
</head>
<body>

<header>
    <h1>🚀 Mi Primera Página</h1>
</header>

<main>
    <div class="card">
        <h2>Hola 👋</h2>
        <p>Esta es una página web simple hecha en un solo archivo HTML con estilos incluidos.</p>
        <button onclick="saludar()">Haz clic</button>
    </div>
</main>

<footer>
    <p>Creado para mi😎</p>
</footer>

<script>
    function saludar() {
        alert("¡Hola! Estás ejecutando JavaScript 🎉");
    }
</script>

</body>
</html>
